<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>넬슨스포츠 판매 현황 대시보드</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:linear-gradient(135deg,#0a0a12,#12121f 50%,#0d0d1a);color:#e8e8f0;min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:920px;margin:0 auto;padding:24px 20px}
h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;display:inline}
.badge{font-size:11px;color:#666;font-weight:500;background:rgba(255,255,255,.05);padding:3px 10px;border-radius:20px;margin-left:12px;display:inline-block;vertical-align:middle}
.subtitle{font-size:12px;color:#555;margin-top:6px}
.filters{display:flex;gap:6px;margin:20px 0;flex-wrap:wrap}
.fbtn{padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#888;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.fbtn:hover{border-color:rgba(255,255,255,.15)}
.fbtn.on{border-color:rgba(233,69,96,.6);background:linear-gradient(135deg,rgba(233,69,96,.2),rgba(233,69,96,.05));color:#e94560}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.kpi{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px 14px;position:relative;overflow:hidden}
.kpi-bar{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:12px 0 0 12px}
.kpi-label{font-size:10px;color:#666;font-weight:600;letter-spacing:.5px;margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px}
.kpi-sub{font-size:10px;color:#555;margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:7px 18px;border-radius:8px;border:none;background:transparent;color:#666;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.tab.on{background:rgba(233,69,96,.15);color:#e94560}
.card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:20px 16px;margin-bottom:20px}
.card-title{font-size:13px;font-weight:700;color:#ccc;margin-bottom:14px}

/* Bar Chart CSS */
.chart-container{display:flex;gap:0}
.y-axis{display:flex;flex-direction:column;justify-content:space-between;height:220px;padding-right:8px;font-size:9px;color:#555;text-align:right;min-width:45px;flex-shrink:0}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:220px;padding:0 4px;border-bottom:1px solid rgba(255,255,255,.06);flex:1;overflow:hidden}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;cursor:pointer;position:relative;min-width:0}
.bar-col{display:flex;align-items:flex-end;gap:2px;width:100%;height:100%}
.bar{border-radius:3px 3px 0 0;transition:all .3s;min-width:6px;flex:1}
.bar:hover{opacity:1!important;filter:brightness(1.3)}
.bar-tooltip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(20,20,30,.95);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;font-size:11px;white-space:nowrap;z-index:10;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.bar-group:hover .bar-tooltip{display:block}
.bar-labels{display:flex;gap:3px;padding:0 4px;margin-left:53px}
.bar-label-item{flex:1;font-size:8px;color:#666;text-align:center;padding-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}

/* Donut CSS */
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:40px;flex-wrap:wrap;padding:20px 0}
.donut-svg{width:200px;height:200px}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#888}
.donut-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.donut-legend-val{color:#ccc;font-weight:600;margin-left:auto;padding-left:16px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{border-bottom:1px solid rgba(255,255,255,.08)}
th{padding:8px 10px;color:#666;font-weight:600;font-size:10px;white-space:nowrap}
.al{text-align:left}.ar{text-align:right}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr.sel{background:rgba(233,69,96,.08)}
td{padding:10px}
.type-tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}
.progress-bg{width:60px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle}
.progress-fill{height:100%;border-radius:2px}

/* Detail Panel */
.detail-panel{background:linear-gradient(135deg,rgba(233,69,96,.05),rgba(233,69,96,.01));border:1px solid rgba(233,69,96,.15);border-radius:14px;padding:20px;margin-bottom:20px;display:none}
.detail-panel.show{display:block}
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.detail-name{font-size:15px;font-weight:800;color:#fff}
.detail-sub{font-size:11px;color:#888;margin-top:2px}
.close-btn{background:rgba(255,255,255,.06);border:none;border-radius:8px;color:#888;padding:4px 12px;cursor:pointer;font-size:11px;font-family:inherit}
.close-btn:hover{background:rgba(255,255,255,.1)}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.metric{background:rgba(0,0,0,.2);border-radius:10px;padding:12px;text-align:center}
.metric-label{font-size:9px;color:#666;margin-bottom:4px;font-weight:600}
.metric-val{font-size:16px;font-weight:800}
.brand-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.brand-name{font-size:11px;color:#ccc;width:80px;flex-shrink:0}
.brand-bar-bg{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.brand-bar-fill{height:100%;border-radius:3px}
.brand-val{font-size:10px;color:#888;width:60px;text-align:right;flex-shrink:0}
.brand-pct{font-size:10px;color:#555;width:40px;text-align:right;flex-shrink:0}

.legend-row{display:flex;gap:14px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#777}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

.footer{margin-top:24px;padding:16px 0;border-top:1px solid rgba(255,255,255,.05);font-size:10px;color:#444;display:flex;justify-content:space-between}

.view-area{min-height:100px}

@media(max-width:640px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .kpi-val{font-size:16px}
  h1{font-size:18px}
  .donut-wrap{flex-direction:column;gap:20px}
  .bar-chart{height:180px}
  .y-axis{height:180px}
}
</style>
</head>

];

var filter="전체", view="sales", selected=null, bestBrand="전체";

function fmt(n){if(Math.abs(n)>=1e8)return(n/1e8).toFixed(1)+"억";if(Math.abs(n)>=1e4)return(n/1e4).toFixed(0)+"만";return n.toLocaleString()}
function fmtW(n){return n.toLocaleString()+"원"}
function pct(a,b){return b?((a/b)*100).toFixed(1):"0.0"}
function mcol(v){return v>80?"#82b74b":v>50?"#f59e0b":"#e94560"}
function scol(v){return v>50?"#82b74b":v>10?"#f59e0b":"#e94560"}

function getStores(){
  if(filter==="전체")return STORES;
  return STORES.filter(function(s){return s.type===filter});
}

function renderFilters(){
  var el=document.getElementById("filters");
  el.innerHTML="";
  ["전체","직영점","온라인비즈","백화점","아울렛"].forEach(function(ch){
    var btn=document.createElement("button");
    btn.className="fbtn"+(filter===ch?" on":"");
    btn.textContent=ch;
    btn.onclick=function(){filter=ch;selected=null;render()};
    el.appendChild(btn);
  });
}

function renderKPI(){
  var stores=getStores();
  var t={sales:0,qty:0,profit:0,stock:0};
  stores.forEach(function(s){t.sales+=s.sales;t.qty+=s.qty;t.profit+=s.profit;t.stock+=s.stock});
  var items=[
    {label:"총 판매액",value:fmt(t.sales),sub:"VAT 제외",accent:"#e94560"},
    {label:"판매 수량",value:t.qty.toLocaleString()+"개",sub:stores.length+"개 매장",accent:"#3b82f6"},
    {label:"매출이익",value:fmt(t.profit),sub:"이익률 "+pct(t.profit,t.sales)+"%",accent:"#82b74b"},
    {label:"잔여 재고",value:fmt(t.stock),sub:"현재 기준",accent:"#f59e0b"}
  ];
  document.getElementById("kpiGrid").innerHTML=items.map(function(k){
    return '<div class="kpi"><div class="kpi-bar" style="background:'+k.accent+'"></div><div class="kpi-label">'+k.label+'</div><div class="kpi-val">'+k.value+'</div><div class="kpi-sub">'+k.sub+'</div></div>';
  }).join("");
}

function renderTabs(){
  var el=document.getElementById("tabs");
  el.innerHTML="";
  [{key:"sales",label:"매장별 판매"},{key:"brand",label:"브랜드 비중"},{key:"inventory",label:"재고/소진율"},{key:"best",label:"판매 BEST 10"}].forEach(function(v){
    var btn=document.createElement("button");
    btn.className="tab"+(view===v.key?" on":"");
    btn.textContent=v.label;
    btn.onclick=function(){view=v.key;render()};
    el.appendChild(btn);
  });
}

function renderView(){
  var area=document.getElementById("viewArea");
  var legend=document.getElementById("legendRow");
  var title=document.getElementById("chartTitle");
  area.innerHTML="";legend.innerHTML="";

  if(view==="sales"){
    title.textContent="매장별 판매액 · 매출이익";
    var stores=getStores();
    var max=Math.max.apply(null,stores.map(function(s){return s.sales}));
    if(max===0)max=1;
    var ticks=[];for(var i=0;i<=4;i++)ticks.push(fmt(max*(4-i)/4));

    var html='<div class="chart-container"><div class="y-axis">'+ticks.map(function(t){return '<span>'+t+'</span>'}).join("")+'</div><div class="bar-chart">';
    stores.forEach(function(s){
      var h1=Math.max(Math.round((s.sales/max)*210),2);
      var h2=Math.max(Math.round((s.profit/max)*210),1);
      var c=s.name===selected?"#e94560":(TC[s.type]||"#444");
      html+='<div class="bar-group" onclick="selectStore(\''+s.name.replace(/'/g,"\\'")+'\')">';
      html+='<div class="bar-tooltip"><div style="font-weight:700;color:#fff;margin-bottom:4px">'+s.name+'</div>';
      html+='<div style="color:#ccc">판매액: '+fmtW(s.sales)+'</div>';
      html+='<div style="color:#999">이익: '+fmtW(s.profit)+'</div></div>';
      html+='<div class="bar-col">';
      html+='<div class="bar" style="height:'+h1+'px;background:'+c+';opacity:'+(s.name===selected?'1':'0.75')+'"></div>';
      html+='<div class="bar" style="height:'+h2+'px;background:'+c+';opacity:0.3"></div>';
      html+='</div></div>';
    });
    html+='</div></div>';
    html+='<div class="bar-labels">';
    stores.forEach(function(s){
      var lbl=s.name.length>7?s.name.slice(0,6)+"…":s.name;
      html+='<div class="bar-label-item" title="'+s.name+'">'+lbl+'</div>';
    });
    html+='</div>';
    area.innerHTML=html;

    legend.innerHTML=Object.keys(TC).map(function(k){return '<div class="legend-item"><div class="legend-dot" style="background:'+TC[k]+'"></div>'+k+'</div>'}).join("");
  }
  else if(view==="brand"){
    title.textContent="브랜드별 매출 비중";
    var total=BRANDS.reduce(function(a,b){return a+b.sales},0);
    var cumAngle=0;
    var paths="";
    var cx=100,cy=100,r=85,ri=50;

    BRANDS.forEach(function(b){
      var angle=(b.sales/total)*360;
      var startRad=(cumAngle-90)*Math.PI/180;
      var endRad=(cumAngle+angle-90)*Math.PI/180;
      var large=angle>180?1:0;

      var x1o=cx+r*Math.cos(startRad), y1o=cy+r*Math.sin(startRad);
      var x2o=cx+r*Math.cos(endRad), y2o=cy+r*Math.sin(endRad);
      var x1i=cx+ri*Math.cos(endRad), y1i=cy+ri*Math.sin(endRad);
      var x2i=cx+ri*Math.cos(startRad), y2i=cy+ri*Math.sin(startRad);

      var d="M "+x1o+" "+y1o+" A "+r+" "+r+" 0 "+large+" 1 "+x2o+" "+y2o+" L "+x1i+" "+y1i+" A "+ri+" "+ri+" 0 "+large+" 0 "+x2i+" "+y2i+" Z";
      paths+='<path d="'+d+'" fill="'+(BC[b.name]||"#666")+'" stroke="#12121f" stroke-width="1.5"><title>'+b.name+": "+fmtW(b.sales)+" ("+((b.sales/total)*100).toFixed(1)+"%)</title></path>";
      cumAngle+=angle;
    });

    var legendHtml=BRANDS.map(function(b){
      var p=((b.sales/total)*100).toFixed(1);
      return '<div class="donut-legend-item"><div class="donut-legend-dot" style="background:'+(BC[b.name]||"#666")+'"></div><span>'+b.name+'</span><span class="donut-legend-val">'+p+'%</span></div>';
    }).join("");

    area.innerHTML='<div class="donut-wrap"><svg class="donut-svg" viewBox="0 0 200 200">'+paths+'</svg><div class="donut-legend">'+legendHtml+'</div></div>';
  }
  else if(view==="inventory"){
    title.textContent="브랜드별 재고 현황 · 소진율";
    var html='<table><thead><tr><th class="al">브랜드</th><th class="ar">기획수량</th><th class="ar">판매수량</th><th class="ar">재고수량</th><th class="ar">소진율</th></tr></thead><tbody>';
    BRANDS.forEach(function(b){
      var st=b.planned>0?(b.qty/b.planned*100):0;
      var col=scol(st);
      html+='<tr><td><div style="display:flex;align-items:center;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:'+(BC[b.name]||"#666")+'"></div><span style="font-weight:600">'+b.name+'</span></div></td>';
      html+='<td class="ar" style="color:#888">'+b.planned.toLocaleString()+'</td>';
      html+='<td class="ar" style="color:#ccc;font-weight:600">'+b.qty.toLocaleString()+'</td>';
      html+='<td class="ar" style="color:#888">'+b.stock.toLocaleString()+'</td>';
      html+='<td class="ar"><div style="display:flex;align-items:center;justify-content:flex-end;gap:8px"><div class="progress-bg"><div class="progress-fill" style="width:'+Math.min(st,100)+'%;background:'+col+'"></div></div><span style="font-weight:700;font-size:11px;min-width:40px;text-align:right;color:'+col+'">'+st.toFixed(1)+'%</span></div></td></tr>';
    });
    html+='</tbody></table>';
    area.innerHTML=html;
  }
  else if(view==="best"){
    title.textContent="판매 품목 BEST 10";
    var brandList=["전체"];
    var seen={};
    PRODUCTS.forEach(function(p){if(!seen[p.brand]){seen[p.brand]=1;brandList.push(p.brand)}});

    var html='<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">';
    brandList.forEach(function(b){
      var isOn=bestBrand===b;
      var col=b==="전체"?"#e94560":(BC[b]||"#888");
      html+='<button onclick="setBestBrand(\''+b+'\')" style="padding:5px 14px;border-radius:16px;border:1px solid '+(isOn?col+'99':'rgba(255,255,255,.08)')+';background:'+(isOn?col+'22':'rgba(255,255,255,.03)')+';color:'+(isOn?col:'#888')+';font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s">'+b+'</button>';
    });
    html+='</div>';

    var filtered=bestBrand==="전체"?PRODUCTS:PRODUCTS.filter(function(p){return p.brand===bestBrand});
    var top10=filtered.slice(0,10);

    html+='<div style="overflow-x:auto"><table><thead><tr>';
    html+='<th class="al" style="width:30px">#</th>';
    html+='<th class="al">브랜드</th>';
    html+='<th class="al">품번</th>';
    html+='<th class="al">상품명</th>';
    html+='<th class="al">컬러</th>';
    html+='<th class="ar">판매가</th>';
    html+='<th class="ar">판매수량</th>';
    html+='<th class="ar">판매액</th>';
    html+='<th class="ar">재고수량</th>';
    html+='<th class="ar">재고상태</th>';
    html+='</tr></thead><tbody>';

    top10.forEach(function(p,i){
      var stockStatus="";var stockCol="#82b74b";
      if(p.stock<=0){stockStatus="품절";stockCol="#e94560"}
      else if(p.stock<=10){stockStatus="부족";stockCol="#e94560"}
      else if(p.stock<=50){stockStatus="주의";stockCol="#f59e0b"}
      else{stockStatus="양호";stockCol="#82b74b"}

      var brandCol=BC[p.brand]||"#888";

      html+='<tr style="border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s" onmouseenter="this.style.background=\'rgba(255,255,255,.03)\'" onmouseleave="this.style.background=\'transparent\'">';
      html+='<td style="color:#555;font-weight:700">'+(i+1)+'</td>';
      html+='<td><div style="display:flex;align-items:center;gap:6px"><div style="width:6px;height:6px;border-radius:50%;background:'+brandCol+';flex-shrink:0"></div><span style="font-size:10px;color:'+brandCol+';font-weight:600">'+p.brand+'</span></div></td>';
      html+='<td style="color:#999;font-size:10px;font-family:monospace;letter-spacing:-.3px">'+p.sku+'</td>';
      html+='<td style="font-weight:700;color:#ddd;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+p.name+'">'+p.name+'</td>';
      html+='<td style="color:#888;font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+p.color+'">'+p.color+'</td>';
      html+='<td class="ar" style="color:#888">'+fmtW(p.price)+'</td>';
      html+='<td class="ar" style="font-weight:700;color:#ccc">'+p.qty+'개</td>';
      html+='<td class="ar" style="font-weight:700;color:#e94560">'+fmtW(p.sales)+'</td>';
      html+='<td class="ar" style="color:#888">'+p.stock.toLocaleString()+'</td>';
      html+='<td class="ar"><span style="font-size:9px;padding:2px 8px;border-radius:10px;background:'+stockCol+'18;color:'+stockCol+';font-weight:700">'+stockStatus+'</span></td>';
      html+='</tr>';
    });

    html+='</tbody></table></div>';

    if(top10.length>0){
      var totalSales=top10.reduce(function(a,b){return a+b.sales},0);
      var totalQty=top10.reduce(function(a,b){return a+b.qty},0);
      var totalStock=top10.reduce(function(a,b){return a+b.stock},0);
      html+='<div style="display:flex;gap:16px;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;flex-wrap:wrap">';
      html+='<span style="color:#666">TOP 10 합계</span>';
      html+='<span style="color:#ccc;font-weight:700">판매 '+totalQty.toLocaleString()+'개</span>';
      html+='<span style="color:#e94560;font-weight:700">매출 '+fmtW(totalSales)+'</span>';
      html+='<span style="color:#888">잔여재고 '+totalStock.toLocaleString()+'개</span>';
      html+='</div>';
    }

    area.innerHTML=html;
  }
}

function selectStore(name){
  selected=(name===selected)?null:name;
  render();
}

function setBestBrand(b){
  bestBrand=b;
  render();
}

function renderDetail(){
  var panel=document.getElementById("detailPanel");
  if(!selected){panel.className="detail-panel";panel.innerHTML="";return}
  var s=null;
  for(var i=0;i<STORES.length;i++){if(STORES[i].name===selected){s=STORES[i];break}}
  if(!s){panel.className="detail-panel";return}
  panel.className="detail-panel show";

  var margin=pct(s.profit,s.sales);
  var sell=pct(s.qty,s.planned);
  var brands=CROSS[selected]||[];

  var html='<div class="detail-header"><div><div class="detail-name">'+s.name+'</div><div class="detail-sub">'+s.type+' · '+s.channel+'</div></div><button class="close-btn" onclick="selectStore(null)">닫기</button></div>';
  html+='<div class="metric-grid">';
  html+='<div class="metric"><div class="metric-label">판매액</div><div class="metric-val" style="color:#e94560">'+fmtW(s.sales)+'</div></div>';
  html+='<div class="metric"><div class="metric-label">이익률</div><div class="metric-val" style="color:#82b74b">'+margin+'%</div></div>';
  html+='<div class="metric"><div class="metric-label">소진율</div><div class="metric-val" style="color:#3b82f6">'+sell+'%</div></div>';
  html+='</div>';

  if(brands.length){
    html+='<div style="font-size:11px;font-weight:700;color:#888;margin-bottom:8px">브랜드별 매출 구성</div>';
    brands.forEach(function(b){
      var ratio=s.sales>0?(b.s/s.sales*100):0;
      html+='<div class="brand-row"><div class="brand-dot" style="background:'+(BC[b.b]||"#666")+'"></div>';
      html+='<span class="brand-name">'+b.b+'</span>';
      html+='<div class="brand-bar-bg"><div class="brand-bar-fill" style="width:'+ratio+'%;background:'+(BC[b.b]||"#666")+'"></div></div>';
      html+='<span class="brand-val">'+fmt(b.s)+'</span>';
      html+='<span class="brand-pct">'+ratio.toFixed(1)+'%</span></div>';
    });
  }
  panel.innerHTML=html;
}

function renderRanking(){
  var stores=getStores();
  var html="";
  stores.forEach(function(s,i){
    var margin=s.sales>0?(s.profit/s.sales*100):0;
    var sell=s.planned>0?(s.qty/s.planned*100):0;
    var isSel=s.name===selected;
    html+='<tr class="'+(isSel?"sel":"")+'" onclick="selectStore(\''+s.name.replace(/'/g,"\\'")+'\')">';
    html+='<td style="color:#555;font-weight:700;width:30px">'+(i+1)+'</td>';
    html+='<td style="font-weight:700;color:'+(isSel?"#e94560":"#ddd")+'">'+s.name+'</td>';
    html+='<td><span class="type-tag" style="background:'+(TC[s.type]||"#444")+'22;color:'+(TC[s.type]||"#888")+'">'+s.type+'</span></td>';
    html+='<td class="ar" style="font-weight:700;color:#ccc">'+fmt(s.sales)+'</td>';
    html+='<td class="ar" style="color:#888">'+s.qty+'</td>';
    html+='<td class="ar" style="font-weight:600;color:'+mcol(margin)+'">'+margin.toFixed(1)+'%</td>';
    html+='<td class="ar" style="font-weight:600;color:'+scol(sell)+'">'+sell.toFixed(1)+'%</td></tr>';
  });
  document.getElementById("rankBody").innerHTML=html;
}

function render(){
  try{
    renderFilters();
    renderKPI();
    renderTabs();
    renderView();
    renderDetail();
    renderRanking();
  }catch(e){
    document.getElementById("viewArea").innerHTML='<div style="color:#e94560;padding:20px">오류가 발생했습니다: '+e.message+'</div>';
  }
}

render();
</script>
</body>
</html>
